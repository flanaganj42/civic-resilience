<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<title>Civic Resilience Network — OBS Overlay</title>
<style>
/* ── Reset & Base ────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  width: 1920px; height: 1080px; overflow: hidden;
  background: transparent;
  font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
}

/* ── CSS Variables (overridden from scenes.json settings) ────────── */
:root {
  --primary:   #00b4d8;
  --secondary: #1a3a5c;
  --accent:    #48cae4;
  --white:     #ffffff;
  --dark:      #0a1628;
  --trans-ms:  800ms;
  --glow: 0 0 20px rgba(0,180,216,0.4);
}

/* ── Animated Particle Background ───────────────────────────────── */
#bg-canvas {
  position: absolute; inset: 0;
  width: 1920px; height: 1080px;
  z-index: 0;
}

/* ── Scene Container ─────────────────────────────────────────────── */
#scene-wrap {
  position: absolute; inset: 0;
  z-index: 10;
  transition: opacity var(--trans-ms) ease, transform var(--trans-ms) ease;
}
#scene-wrap.fade-out   { opacity: 0; }
#scene-wrap.fade-in    { opacity: 1; }
#scene-wrap.slide-out  { transform: translateY(-40px); opacity: 0; }
#scene-wrap.slide-in   { transform: translateY(0);     opacity: 1; }
#scene-wrap.zoom-out   { transform: scale(1.04);        opacity: 0; }
#scene-wrap.zoom-in    { transform: scale(1);           opacity: 1; }

/* ── Image Grid Layouts ──────────────────────────────────────────── */
.image-area {
  position: absolute;
  overflow: hidden;
  transition: all var(--trans-ms) ease;
}
.image-area img {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
}
.img-label {
  position: absolute; bottom: 0; left: 0; right: 0;
  padding: 8px 14px;
  background: linear-gradient(transparent, rgba(0,0,0,0.72));
  color: var(--white); font-size: 22px; font-weight: 500;
  letter-spacing: 0.02em;
}

/* fullscreen-bg: standby with animated background only */
.layout-fullscreen-bg .image-area { display: none; }

/* fullscreen: one image fills the scene */
.layout-fullscreen .image-area:nth-child(1) {
  inset: 0;
}

/* grid-2: two equal side by side */
.layout-grid-2 .image-area:nth-child(1) { top:0; left:0;    width:960px;  height:1080px; }
.layout-grid-2 .image-area:nth-child(2) { top:0; left:960px; width:960px; height:1080px; }
.layout-grid-2 .image-area { border-right: 2px solid var(--primary); }

/* grid-3: large left + two stacked right */
.layout-grid-3 .image-area:nth-child(1) { top:0;    left:0;    width:1152px; height:1080px; }
.layout-grid-3 .image-area:nth-child(2) { top:0;    left:1152px; width:768px; height:540px; }
.layout-grid-3 .image-area:nth-child(3) { top:540px; left:1152px; width:768px; height:540px; }
.layout-grid-3 .image-area { border: 1px solid rgba(0,180,216,0.3); }

/* grid-4: 2x2 */
.layout-grid-4 .image-area:nth-child(1) { top:0;    left:0;    width:960px; height:540px; }
.layout-grid-4 .image-area:nth-child(2) { top:0;    left:960px; width:960px; height:540px; }
.layout-grid-4 .image-area:nth-child(3) { top:540px; left:0;   width:960px; height:540px; }
.layout-grid-4 .image-area:nth-child(4) { top:540px; left:960px; width:960px; height:540px; }
.layout-grid-4 .image-area { border: 1px solid rgba(0,180,216,0.25); }

/* sidebar-r: 70% left + 30% right */
.layout-sidebar-r .image-area:nth-child(1) { top:0; left:0;     width:1344px; height:1080px; }
.layout-sidebar-r .image-area:nth-child(2) { top:0; left:1344px; width:576px;  height:1080px; }
.layout-sidebar-r .image-area:nth-child(2) {
  border-left: 3px solid var(--primary);
  display: flex; flex-direction: column;
  justify-content: center; align-items: center;
  background: var(--secondary);
}

/* pip: full + small corner */
.layout-pip .image-area:nth-child(1) { inset: 0; }
.layout-pip .image-area:nth-child(2) {
  bottom: 120px; right: 30px; top: auto; left: auto;
  width: 420px; height: 236px;
  border: 3px solid var(--primary);
  box-shadow: var(--glow);
  z-index: 20;
}

/* ── Standby Title (fullscreen-bg) ───────────────────────────────── */
#standby-title {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  z-index: 15; pointer-events: none;
  opacity: 0; transition: opacity 1.2s ease;
}
#standby-title.visible { opacity: 1; }
#standby-title h1 {
  font-size: 82px; font-weight: 800; letter-spacing: 0.04em;
  color: var(--white);
  text-shadow: 0 0 60px rgba(0,180,216,0.6), 0 4px 24px rgba(0,0,0,0.5);
  text-transform: uppercase;
}
#standby-title p {
  margin-top: 14px; font-size: 32px; font-weight: 300;
  color: var(--accent); letter-spacing: 0.18em; text-transform: uppercase;
}
#standby-title .domain {
  margin-top: 24px; font-size: 22px; color: rgba(255,255,255,0.5);
  letter-spacing: 0.12em;
}
.title-line {
  width: 240px; height: 2px;
  background: linear-gradient(90deg, transparent, var(--primary), transparent);
  margin: 18px 0;
  animation: line-pulse 3s ease-in-out infinite;
}
@keyframes line-pulse { 0%,100%{opacity:.4;width:160px} 50%{opacity:1;width:320px} }

/* ── Lower Third ─────────────────────────────────────────────────── */
#lower-third {
  position: absolute; bottom: 90px; left: 0; right: 0;
  height: 88px; z-index: 50;
  display: flex; align-items: stretch;
  transform: translateY(120px); opacity: 0;
  transition: transform 0.55s cubic-bezier(.22,1,.36,1), opacity 0.4s ease;
  pointer-events: none;
}
#lower-third.visible {
  transform: translateY(0); opacity: 1;
}
.lt-accent-bar {
  width: 6px; background: var(--primary);
  box-shadow: var(--glow);
  flex-shrink: 0;
}
.lt-body {
  background: rgba(10,22,40,0.88);
  backdrop-filter: blur(8px);
  padding: 0 28px;
  display: flex; flex-direction: column; justify-content: center;
  border-top: 1px solid rgba(0,180,216,0.3);
  border-bottom: 1px solid rgba(0,180,216,0.3);
  flex: 1;
}
.lt-name  { font-size: 34px; font-weight: 700; color: var(--white); line-height: 1.15; }
.lt-title { font-size: 20px; font-weight: 400; color: var(--primary); margin-top: 2px; }
.lt-logo-end {
  width: 180px; background: var(--primary);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.lt-logo-end span {
  color: var(--dark); font-size: 13px; font-weight: 800;
  text-transform: uppercase; letter-spacing: 0.08em;
  writing-mode: vertical-rl; text-orientation: mixed;
  transform: rotate(180deg);
}

/* ── News Ticker ─────────────────────────────────────────────────── */
#ticker {
  position: absolute; bottom: 0; left: 0; right: 0;
  height: 52px; z-index: 50;
  background: rgba(0,9,25,0.9);
  border-top: 2px solid var(--primary);
  display: flex; align-items: center;
  overflow: hidden;
}
.ticker-label {
  background: var(--primary);
  color: var(--dark);
  font-size: 16px; font-weight: 900;
  text-transform: uppercase; letter-spacing: 0.12em;
  padding: 0 18px; height: 100%;
  display: flex; align-items: center;
  flex-shrink: 0; white-space: nowrap;
}
.ticker-track {
  flex: 1; overflow: hidden; height: 100%;
  display: flex; align-items: center;
}
.ticker-inner {
  display: flex; align-items: center;
  white-space: nowrap;
  animation: ticker-scroll linear infinite;
}
.ticker-item {
  font-size: 19px; color: var(--white);
  padding: 0 48px;
}
.ticker-sep {
  color: var(--primary); font-size: 22px; font-weight: 300;
}
@keyframes ticker-scroll {
  from { transform: translateX(0); }
  to   { transform: translateX(-50%); }
}

/* ── Branding Bug (corner) ───────────────────────────────────────── */
#brand-bug {
  position: absolute; z-index: 60;
  bottom: 60px; right: 24px;
  background: rgba(10,22,40,0.75);
  border: 1px solid rgba(0,180,216,0.4);
  border-radius: 6px;
  padding: 8px 16px;
  backdrop-filter: blur(6px);
  pointer-events: none;
}
#brand-bug span {
  color: var(--primary); font-size: 18px; font-weight: 700;
  letter-spacing: 0.08em; vertical-align: middle;
}
#brand-bug { display: flex; align-items: center; gap: 8px; }
#brand-bug .live-dot {
  display: inline-block; width: 8px; height: 8px;
  background: #ff3b3b; border-radius: 50%;
  margin-right: 8px;
  animation: blink 1.4s ease-in-out infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

/* ── Clock ───────────────────────────────────────────────────────── */
#clock {
  position: absolute; top: 20px; right: 24px; z-index: 60;
  color: rgba(255,255,255,0.7);
  font-size: 22px; font-weight: 300;
  letter-spacing: 0.06em; pointer-events: none;
}

/* ── Scene Nav (keyboard / URL control) ──────────────────────────── */
#scene-nav {
  position: absolute; bottom: 60px; left: 24px; z-index: 60;
  color: rgba(255,255,255,0.3);
  font-size: 13px; pointer-events: none;
}
</style>
</head>
<body>

<!-- Animated background canvas -->
<canvas id="bg-canvas"></canvas>

<!-- Scene wrapper -->
<div id="scene-wrap" class="fade-in"></div>

<!-- Standby title (shown when layout is fullscreen-bg) -->
<div id="standby-title">
  <h1 id="standby-h1">Civic Resilience Network</h1>
  <div class="title-line"></div>
  <p id="standby-sub">Live Broadcast</p>
  <div class="domain" id="standby-domain">civicresilience.net</div>
</div>

<!-- Lower third -->
<div id="lower-third">
  <div class="lt-accent-bar"></div>
  <div class="lt-body">
    <div class="lt-name"  id="lt-name">Speaker Name</div>
    <div class="lt-title" id="lt-title">Title / Organization</div>
  </div>
  <div class="lt-logo-end"><span>LIVE</span></div>
</div>

<!-- Ticker -->
<div id="ticker">
  <div class="ticker-label">LIVE</div>
  <div class="ticker-track">
    <div class="ticker-inner" id="ticker-inner"></div>
  </div>
</div>

<!-- Branding bug — shows logo if img/logo.png exists, falls back to text -->
<div id="brand-bug">
  <span class="live-dot"></span>
  <img id="brand-logo" src="./img/logo.png"
       alt="Civic Resilience Network"
       style="height:38px; width:auto; vertical-align:middle; display:inline-block;"
       onerror="this.style.display='none'; document.getElementById('brand-text').style.display='inline';" />
  <span id="brand-text" style="display:none;"><span id="brand-text-inner">civicresilience.net</span></span>
</div>

<!-- Clock -->
<div id="clock" id="clock-el"></div>

<!-- Scene indicator -->
<div id="scene-nav" id="scene-nav-el"></div>

<script>
// ─── Config loader ────────────────────────────────────────────────
const CONFIG_URL = './scenes.json';
let CONFIG = null;
let currentSceneIdx = 0;
let lowerThirdQueue = [];
let lowerThirdTimer = null;

async function loadConfig() {
  try {
    const r = await fetch(CONFIG_URL + '?_=' + Date.now());
    CONFIG = await r.json();
  } catch(e) {
    // Fallback inline config if fetch fails (local file:// in OBS)
    CONFIG = {
      settings: {
        default_transition: 'fade', default_transition_ms: 800,
        auto_advance: false, auto_advance_ms: 10000,
        background_style: 'network',
        brand_color_primary: '#00b4d8', brand_color_secondary: '#1a3a5c',
        show_ticker: true, show_logo: true, show_clock: true,
        logo_text: 'civicresilience.net', logo_position: 'bottom-right'
      },
      ticker_items: ['Civic Resilience Network — Live', 'civicresilience.net'],
      scenes: [{
        id: 'standby', name: 'Standby', layout: 'fullscreen-bg',
        transition: 'fade', show_title: true,
        title: 'Civic Resilience Network', subtitle: 'Live Broadcast', images: []
      }],
      lower_thirds: []
    };
  }
  applySettings();
  initTicker();
  initClock();
  gotoScene(0);
  if (CONFIG.settings.auto_advance) startAutoAdvance();
}

// ─── Apply global settings ────────────────────────────────────────
function applySettings() {
  const s = CONFIG.settings;
  const r = document.documentElement.style;
  r.setProperty('--primary',   s.brand_color_primary  || '#00b4d8');
  r.setProperty('--secondary', s.brand_color_secondary || '#1a3a5c');
  r.setProperty('--trans-ms',  (s.default_transition_ms || 800) + 'ms');
  document.getElementById('brand-text').textContent = s.logo_text || 'civicresilience.net';
  document.getElementById('brand-bug').style.display = s.show_logo ? '' : 'none';
  document.getElementById('ticker').style.display    = s.show_ticker ? '' : 'none';
  document.getElementById('clock').style.display     = s.show_clock ? '' : 'none';
  // Logo position
  const bug = document.getElementById('brand-bug');
  const pos = s.logo_position || 'bottom-right';
  bug.style.bottom = pos.includes('bottom') ? '60px' : 'auto';
  bug.style.top    = pos.includes('top')    ? '20px' : 'auto';
  bug.style.right  = pos.includes('right')  ? '24px' : 'auto';
  bug.style.left   = pos.includes('left')   ? '24px' : 'auto';
}

// ─── Scene renderer ───────────────────────────────────────────────
function gotoScene(idx, transOverride) {
  if (!CONFIG || !CONFIG.scenes.length) return;
  idx = ((idx % CONFIG.scenes.length) + CONFIG.scenes.length) % CONFIG.scenes.length;
  currentSceneIdx = idx;
  const scene = CONFIG.scenes[idx];
  const trans = transOverride || scene.transition || CONFIG.settings.default_transition || 'fade';
  const wrap  = document.getElementById('scene-wrap');
  const standby = document.getElementById('standby-title');

  // Out animation
  wrap.classList.remove('fade-in','slide-in','zoom-in');
  wrap.classList.add(trans === 'slide-up' ? 'slide-out' : trans === 'zoom-in' ? 'zoom-out' : 'fade-out');

  setTimeout(() => {
    renderScene(scene, wrap);
    wrap.classList.remove('fade-out','slide-out','zoom-out');
    wrap.classList.add(trans === 'slide-up' ? 'slide-in' : trans === 'zoom-in' ? 'zoom-in' : 'fade-in');
    // Standby title
    const isStandby = scene.layout === 'fullscreen-bg';
    standby.classList.toggle('visible', isStandby);
    if (isStandby) {
      document.getElementById('standby-h1').textContent   = scene.title    || 'Civic Resilience Network';
      document.getElementById('standby-sub').textContent  = scene.subtitle || 'Live Broadcast';
    }
    // Scene nav indicator
    document.getElementById('scene-nav').textContent =
      `Scene ${idx+1}/${CONFIG.scenes.length}: ${scene.name}`;
  }, CONFIG.settings.default_transition_ms || 800);
}

function renderScene(scene, wrap) {
  wrap.innerHTML = '';
  wrap.className = 'layout-' + scene.layout.replace(/-/g,'_').replace(/_/g,'-');
  // Reset to exact layout class
  wrap.className = `layout-${scene.layout}`;

  (scene.images || []).forEach((img, i) => {
    const div = document.createElement('div');
    div.className = 'image-area';
    if (img.src) {
      const im = document.createElement('img');
      im.src = img.src;
      im.alt = img.label || '';
      div.appendChild(im);
    }
    if (img.label) {
      const lbl = document.createElement('div');
      lbl.className = 'img-label';
      lbl.textContent = img.label;
      div.appendChild(lbl);
    }
    wrap.appendChild(div);
  });
}

// ─── Auto-advance ─────────────────────────────────────────────────
let autoTimer = null;
function startAutoAdvance() {
  if (autoTimer) clearInterval(autoTimer);
  autoTimer = setInterval(() => {
    gotoScene(currentSceneIdx + 1);
  }, CONFIG.settings.auto_advance_ms || 10000);
}

// ─── Lower thirds ─────────────────────────────────────────────────
function showLowerThird(name, title, durationMs) {
  const el = document.getElementById('lower-third');
  document.getElementById('lt-name').textContent  = name;
  document.getElementById('lt-title').textContent = title;
  el.classList.add('visible');
  if (lowerThirdTimer) clearTimeout(lowerThirdTimer);
  lowerThirdTimer = setTimeout(() => {
    el.classList.remove('visible');
  }, durationMs || 5000);
}

function queueLowerThirds(items) {
  lowerThirdQueue = [...(items || [])];
  processLowerThirdQueue();
}

function processLowerThirdQueue() {
  if (!lowerThirdQueue.length) return;
  const lt = lowerThirdQueue.shift();
  showLowerThird(lt.name, lt.title, lt.duration_ms || 5000);
  setTimeout(processLowerThirdQueue, (lt.duration_ms || 5000) + 1200);
}

// ─── Ticker ───────────────────────────────────────────────────────
function initTicker() {
  const items = CONFIG.ticker_items || ['civicresilience.net — Live'];
  const inner = document.getElementById('ticker-inner');
  // Double the items so seamless loop works
  const all = [...items, ...items];
  inner.innerHTML = all.map(t =>
    `<span class="ticker-item">${t}</span><span class="ticker-sep">◆</span>`
  ).join('');
  // Set animation duration based on content length
  const totalChars = items.join('').length;
  const dur = Math.max(20, totalChars * 0.22);
  inner.style.animationDuration = dur + 's';
}

// ─── Clock ────────────────────────────────────────────────────────
function initClock() {
  const el = document.getElementById('clock');
  function tick() {
    const now = new Date();
    el.textContent = now.toLocaleTimeString('en-US',
      { hour:'2-digit', minute:'2-digit', second:'2-digit', hour12: true });
  }
  tick();
  setInterval(tick, 1000);
}

// ─── Keyboard / URL controls ──────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === ' ') gotoScene(currentSceneIdx + 1);
  if (e.key === 'ArrowLeft')  gotoScene(currentSceneIdx - 1);
  if (e.key >= '1' && e.key <= '9') gotoScene(parseInt(e.key) - 1);
  if (e.key === 'l') queueLowerThirds(CONFIG.lower_thirds || []);
  if (e.key === 'r') loadConfig(); // hot reload
});

// URL hash control: overlay.html#scene=2 or #lt=James+Flanagano|Title
function checkHash() {
  const hash = window.location.hash.slice(1);
  if (!hash || !CONFIG) return;
  const params = Object.fromEntries(hash.split('&').map(p => p.split('=')));
  if (params.scene !== undefined) gotoScene(parseInt(params.scene) - 1);
  if (params.lt) {
    const [name, title] = decodeURIComponent(params.lt).split('|');
    showLowerThird(name, title || '', 6000);
  }
  if (params.reload) loadConfig();
}
window.addEventListener('hashchange', checkHash);

// ─── Particle Network Background ──────────────────────────────────
(function initParticles() {
  const canvas = document.getElementById('bg-canvas');
  const ctx    = canvas.getContext('2d');
  canvas.width = 1920; canvas.height = 1080;

  const NUM = 80;
  const MAX_DIST = 200;
  const PRIMARY   = [0, 180, 216];   // #00b4d8
  const SECONDARY = [26, 58, 92];    // #1a3a5c

  // Fill background gradient
  function drawBg() {
    const grad = ctx.createRadialGradient(960, 540, 0, 960, 540, 900);
    grad.addColorStop(0,   '#0d2137');
    grad.addColorStop(0.6, '#091929');
    grad.addColorStop(1,   '#040d14');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, 1920, 1080);
  }

  // Subtle hex grid overlay
  function drawHexGrid() {
    ctx.save();
    ctx.strokeStyle = 'rgba(0,180,216,0.04)';
    ctx.lineWidth = 1;
    const size = 60;
    const h = size * Math.sqrt(3);
    for (let row = -1; row < 1080/h + 1; row++) {
      for (let col = -1; col < 1920/(size*1.5) + 1; col++) {
        const x = col * size * 1.5;
        const y = row * h + (col % 2 === 0 ? 0 : h/2);
        ctx.beginPath();
        for (let i = 0; i < 6; i++) {
          const angle = Math.PI/180 * (60*i - 30);
          const px = x + size * Math.cos(angle);
          const py = y + size * Math.sin(angle);
          i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
        }
        ctx.closePath();
        ctx.stroke();
      }
    }
    ctx.restore();
  }

  // Particles
  const particles = Array.from({length: NUM}, () => ({
    x:  Math.random() * 1920,
    y:  Math.random() * 1080,
    vx: (Math.random() - 0.5) * 0.5,
    vy: (Math.random() - 0.5) * 0.5,
    r:  1.5 + Math.random() * 3,
    alpha: 0.4 + Math.random() * 0.6,
    pulse: Math.random() * Math.PI * 2,
  }));

  function lerp(a, b, t) { return a + (b-a)*t; }

  function drawParticles(t) {
    particles.forEach(p => {
      p.pulse += 0.018;
      const a = p.alpha * (0.6 + 0.4 * Math.sin(p.pulse));
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
      ctx.fillStyle = `rgba(${PRIMARY[0]},${PRIMARY[1]},${PRIMARY[2]},${a})`;
      ctx.fill();
    });
  }

  function drawConnections() {
    for (let i = 0; i < particles.length; i++) {
      for (let j = i+1; j < particles.length; j++) {
        const dx = particles[i].x - particles[j].x;
        const dy = particles[i].y - particles[j].y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        if (dist < MAX_DIST) {
          const a = (1 - dist/MAX_DIST) * 0.25;
          ctx.beginPath();
          ctx.moveTo(particles[i].x, particles[i].y);
          ctx.lineTo(particles[j].x, particles[j].y);
          ctx.strokeStyle = `rgba(${PRIMARY[0]},${PRIMARY[1]},${PRIMARY[2]},${a})`;
          ctx.lineWidth = 0.8;
          ctx.stroke();
        }
      }
    }
  }

  function moveParticles() {
    particles.forEach(p => {
      p.x += p.vx; p.y += p.vy;
      if (p.x < 0) p.x = 1920; if (p.x > 1920) p.x = 0;
      if (p.y < 0) p.y = 1080; if (p.y > 1080) p.y = 0;
    });
  }

  // Slow wave distortion lines
  function drawWaves(t) {
    ctx.save();
    ctx.globalAlpha = 0.06;
    for (let w = 0; w < 3; w++) {
      ctx.beginPath();
      const yBase = 200 + w * 340;
      for (let x = 0; x <= 1920; x += 8) {
        const y = yBase + Math.sin((x/280) + t*0.0008 + w*1.2) * 40
                       + Math.sin((x/120) + t*0.0015 + w*0.7) * 18;
        x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      }
      ctx.strokeStyle = `rgba(${PRIMARY[0]},${PRIMARY[1]},${PRIMARY[2]},1)`;
      ctx.lineWidth = 1.5;
      ctx.stroke();
    }
    ctx.restore();
  }

  let frame = 0;
  function animate(ts) {
    frame++;
    ctx.clearRect(0, 0, 1920, 1080);
    drawBg();
    if (frame % 4 === 0) drawHexGrid(); // draw hex every 4 frames (static-ish)
    drawWaves(ts);
    drawConnections();
    drawParticles(ts);
    moveParticles();
    requestAnimationFrame(animate);
  }
  // Draw hex once into offscreen first
  requestAnimationFrame(animate);
})();

// ─── Live API state polling ────────────────────────────────────────
// Polls api.civicresilience.net/overlay/state every 5s for speaker
// and ticker updates pushed from the control panel or news bot.
const API_STATE_URL = 'https://api.civicresilience.net/overlay/state';
let _apiVersion = -1;
let _apiLtVisible = false;

async function pollApiState() {
  try {
    const r = await fetch(API_STATE_URL);
    if (!r.ok) return;
    const s = await r.json();
    if (s.version === _apiVersion) return;
    _apiVersion = s.version;

    // Lower third
    const ltEl = document.getElementById('lower-third');
    if (s.lower_third_visible && s.speaker_name) {
      document.getElementById('lt-name').textContent  = s.speaker_name  || '';
      document.getElementById('lt-title').textContent = s.speaker_title || '';
      ltEl.classList.add('visible');
      _apiLtVisible = true;
    } else if (_apiLtVisible) {
      ltEl.classList.remove('visible');
      _apiLtVisible = false;
    }

    // Ticker — API items take over when present
    if (s.ticker_items && s.ticker_items.length) {
      if (CONFIG) CONFIG.ticker_items = s.ticker_items;
      else CONFIG = { ticker_items: s.ticker_items };
      initTicker();
    }
  } catch(e) {}
}
setInterval(pollApiState, 5000);

// ─── Boot ─────────────────────────────────────────────────────────
loadConfig().then(() => { checkHash(); pollApiState(); });

// Hot reload scenes.json every 30s
setInterval(() => {
  if (CONFIG) loadConfig();
}, 30000);
</script>
