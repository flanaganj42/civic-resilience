<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Civic Resilience Network — Informed. Engaged. Resilient.</title>
<meta name="description" content="Independent news intelligence — see who's covering what, who owns your news, and where the blindspots are.">
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0a1628;--navy2:#0f1f38;--navy3:#1a3a5c;
  --teal:#00b4d8;--teal2:#48cae4;--teal3:#90e0ef;
  --white:#f8fafc;--muted:#94a3b8;--border:rgba(0,180,216,.18);
  --left:#3b82f6;--lean-left:#93c5fd;--center:#22c55e;
  --lean-right:#fca5a5;--right:#ef4444;--far:#7c3aed;
}
html{scroll-behavior:smooth}
body{background:var(--navy);color:var(--white);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh}
a{color:var(--teal);text-decoration:none}
a:hover{color:var(--teal2)}
button{cursor:pointer;border:none;outline:none}
input{outline:none}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--navy)}
::-webkit-scrollbar-thumb{background:var(--navy3);border-radius:3px}

/* Layout */
.container{max-width:1200px;margin:0 auto;padding:0 20px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}

/* Nav */
nav{position:sticky;top:0;z-index:100;background:rgba(10,22,40,.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border)}
.nav-inner{display:flex;align-items:center;justify-content:space-between;height:60px;max-width:1200px;margin:0 auto;padding:0 20px}
.nav-logo{display:flex;align-items:center;gap:10px;font-weight:800;font-size:18px;letter-spacing:.04em}
.nav-logo .dot{width:8px;height:8px;border-radius:50%;background:#ef4444;animation:blink 1.4s ease-in-out infinite;flex-shrink:0}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.nav-links{display:flex;gap:28px;font-size:14px;font-weight:500}
.nav-links a{color:var(--muted);transition:color .2s}
.nav-links a:hover,.nav-links a.active{color:var(--teal)}
.nav-cta{background:var(--teal);color:var(--navy);padding:8px 18px;border-radius:6px;font-size:13px;font-weight:700;letter-spacing:.04em;text-transform:uppercase}
.nav-cta:hover{background:var(--teal2);color:var(--navy)}

/* Hero */
.hero{padding:80px 0 60px;text-align:center;background:radial-gradient(ellipse at 50% 0%,rgba(0,180,216,.12) 0%,transparent 70%)}
.hero-eyebrow{font-size:12px;font-weight:700;letter-spacing:.2em;color:var(--teal);text-transform:uppercase;margin-bottom:16px}
.hero h1{font-size:clamp(36px,5vw,64px);font-weight:900;line-height:1.1;letter-spacing:-.02em;margin-bottom:20px}
.hero h1 span{color:var(--teal)}
.hero-sub{font-size:18px;color:var(--muted);max-width:600px;margin:0 auto 36px;line-height:1.6}
.hero-stats{display:flex;justify-content:center;gap:48px;margin-top:40px;padding-top:40px;border-top:1px solid var(--border)}
.stat-val{font-size:32px;font-weight:800;color:var(--teal)}
.stat-lbl{font-size:12px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-top:4px}

/* Section titles */
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}
.section-title{font-size:22px;font-weight:800;display:flex;align-items:center;gap:10px}
.section-title::before{content:'';display:block;width:4px;height:24px;background:var(--teal);border-radius:2px}
.section-tag{background:var(--navy3);color:var(--teal);font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;letter-spacing:.1em;text-transform:uppercase}

/* Bias meter */
.bias-track{height:6px;border-radius:3px;background:linear-gradient(90deg,#7c3aed,#3b82f6,#93c5fd,#22c55e,#fca5a5,#ef4444,#7c3aed);position:relative;margin:6px 0}
.bias-thumb{position:absolute;top:50%;width:12px;height:12px;border-radius:50%;border:2px solid var(--white);transform:translate(-50%,-50%);transition:left .4s ease}
.bias-labels{display:flex;justify-content:space-between;font-size:9px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-top:2px}
.bias-badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:700;white-space:nowrap}
.b-far_left{background:rgba(124,58,237,.2);color:#a78bfa}
.b-left{background:rgba(59,130,246,.2);color:#93c5fd}
.b-lean_left{background:rgba(147,197,253,.2);color:#bfdbfe}
.b-center{background:rgba(34,197,94,.2);color:#86efac}
.b-lean_right{background:rgba(252,165,165,.2);color:#fca5a5}
.b-right{background:rgba(239,68,68,.2);color:#fca5a5}
.b-far_right{background:rgba(124,58,237,.2);color:#a78bfa}

/* Coverage bar */
.coverage-bar{display:flex;height:4px;border-radius:2px;overflow:hidden;gap:2px;margin:8px 0}
.cov-seg{border-radius:2px;transition:width .4s}
.cov-left{background:var(--left)}
.cov-center{background:var(--center)}
.cov-right{background:var(--right)}

/* News cards */
.news-grid{display:flex;flex-direction:column;gap:12px}
.news-card{background:var(--navy2);border:1px solid var(--border);border-radius:12px;padding:20px;transition:border-color .2s,transform .15s}
.news-card:hover{border-color:var(--teal);transform:translateY(-1px)}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;margin-bottom:12px}
.card-headline{font-size:17px;font-weight:700;line-height:1.35;flex:1}
.card-headline a{color:var(--white)}
.card-headline a:hover{color:var(--teal)}
.card-meta{display:flex;align-items:center;gap:12px;margin-top:8px;flex-wrap:wrap}
.source-chip{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted)}
.source-chip .owner{font-size:11px;color:rgba(148,163,184,.6)}
.coverage-count{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:4px}
.coverage-count strong{color:var(--teal)}
.blindspot-flag{display:inline-flex;align-items:center;gap:4px;background:rgba(245,158,11,.12);color:#fbbf24;font-size:11px;font-weight:700;padding:3px 8px;border-radius:10px;letter-spacing:.06em}
.card-description{font-size:14px;color:var(--muted);line-height:1.5;margin-top:8px}
.card-img{width:100px;height:70px;border-radius:8px;object-fit:cover;flex-shrink:0;background:var(--navy3)}
.factuality{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;padding:2px 8px;border-radius:10px}
.f-very_high{background:rgba(34,197,94,.15);color:#86efac}
.f-high{background:rgba(34,197,94,.1);color:#a7f3d0}
.f-mixed{background:rgba(245,158,11,.12);color:#fcd34d}
.f-low,.f-very_low{background:rgba(239,68,68,.12);color:#fca5a5}

/* Topic filter */
.topic-filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:24px}
.topic-btn{padding:7px 16px;border-radius:20px;font-size:13px;font-weight:600;background:var(--navy2);color:var(--muted);border:1px solid var(--border);transition:all .2s}
.topic-btn:hover,.topic-btn.active{background:var(--teal);color:var(--navy);border-color:var(--teal)}

/* Sidebar */
.sidebar{display:flex;flex-direction:column;gap:20px}
.widget{background:var(--navy2);border:1px solid var(--border);border-radius:12px;padding:20px}
.widget-title{font-size:14px;font-weight:800;color:var(--teal);letter-spacing:.08em;text-transform:uppercase;margin-bottom:14px}

/* Source list */
.source-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)}
.source-row:last-child{border-bottom:none}
.source-name{font-size:13px;font-weight:600}
.source-owner-sm{font-size:11px;color:var(--muted);margin-top:1px}

/* Newsletter section */
.newsletter-section{padding:80px 0;background:linear-gradient(180deg,transparent,rgba(0,180,216,.06),transparent)}
.nl-card{background:var(--navy2);border:1px solid var(--border);border-radius:16px;padding:40px;text-align:center;max-width:600px;margin:0 auto}
.nl-card h2{font-size:28px;font-weight:800;margin-bottom:12px}
.nl-card p{color:var(--muted);margin-bottom:28px;line-height:1.6}
.nl-form{display:flex;gap:10px;max-width:420px;margin:0 auto}
.nl-form input{flex:1;background:var(--navy3);border:1px solid var(--border);border-radius:8px;padding:12px 16px;color:var(--white);font-size:14px}
.nl-form input:focus{border-color:var(--teal)}
.nl-form input::placeholder{color:var(--muted)}
.nl-submit{background:var(--teal);color:var(--navy);padding:12px 20px;border-radius:8px;font-weight:700;font-size:14px;white-space:nowrap}
.nl-submit:hover{background:var(--teal2)}

/* Civic tools */
.civic-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.civic-card{background:var(--navy2);border:1px solid var(--border);border-radius:12px;padding:24px;transition:border-color .2s}
.civic-card:hover{border-color:var(--teal)}
.civic-icon{font-size:28px;margin-bottom:12px}
.civic-card h3{font-size:16px;font-weight:700;margin-bottom:8px}
.civic-card p{font-size:13px;color:var(--muted);line-height:1.5;margin-bottom:14px}
.civic-link{font-size:13px;color:var(--teal);font-weight:600;display:flex;align-items:center;gap:4px}

/* Ownership breakdown */
.ownership-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.ownership-row:last-child{border-bottom:none}
.own-bar-wrap{flex:1;height:4px;background:var(--navy3);border-radius:2px;overflow:hidden}
.own-bar{height:100%;background:var(--teal);border-radius:2px}
.own-label{font-size:12px;color:var(--muted);width:130px;text-transform:capitalize}
.own-pct{font-size:12px;color:var(--white);font-weight:600;width:36px;text-align:right}

/* Loading spinner */
.spinner{display:inline-block;width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--teal);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-state{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:60px;color:var(--muted);font-size:14px}

/* Footer */
footer{background:var(--navy2);border-top:1px solid var(--border);padding:48px 0 24px}
.footer-grid{display:grid;grid-template-columns:2fr 1fr 1fr;gap:40px;margin-bottom:40px}
.footer-brand{font-size:20px;font-weight:800;margin-bottom:10px}
.footer-desc{font-size:13px;color:var(--muted);line-height:1.6}
.footer-col h4{font-size:12px;font-weight:700;letter-spacing:.12em;color:var(--teal);text-transform:uppercase;margin-bottom:14px}
.footer-col ul{list-style:none;display:flex;flex-direction:column;gap:8px}
.footer-col ul li a{font-size:13px;color:var(--muted)}
.footer-col ul li a:hover{color:var(--white)}
.footer-bottom{border-top:1px solid var(--border);padding-top:20px;display:flex;justify-content:space-between;font-size:12px;color:var(--muted)}

/* Responsive */
@media(max-width:768px){
  .grid-2,.grid-3,.footer-grid{grid-template-columns:1fr}
  .nav-links{display:none}
  .hero{padding:48px 0 36px}
  .hero-stats{flex-wrap:wrap;gap:24px}
}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useCallback } = React;

const API = 'https://api.civicresilience.net';

// Inline bias data from sources_db.json (subset of key sources)
const SOURCES = {
  'apnews.com':        {name:'AP News',        bias:'center',     bias_score:0,    factuality:'very_high', owner:'Associated Press (nonprofit)'},
  'reuters.com':       {name:'Reuters',         bias:'center',     bias_score:0,    factuality:'very_high', owner:'Thomson Reuters'},
  'bbc.com':           {name:'BBC News',         bias:'center',     bias_score:-.5,  factuality:'very_high', owner:'UK Public Broadcaster'},
  'npr.org':           {name:'NPR',              bias:'lean_left',  bias_score:-1,   factuality:'very_high', owner:'NPR (nonprofit)'},
  'nytimes.com':       {name:'New York Times',   bias:'lean_left',  bias_score:-1,   factuality:'very_high', owner:'NYT Company'},
  'washingtonpost.com':{name:'Washington Post',  bias:'lean_left',  bias_score:-1.5, factuality:'high',      owner:'Jeff Bezos'},
  'theguardian.com':   {name:'The Guardian',     bias:'lean_left',  bias_score:-1.5, factuality:'high',      owner:'Guardian Media Group'},
  'politico.com':      {name:'Politico',          bias:'lean_left',  bias_score:-.5,  factuality:'high',      owner:'Axel Springer'},
  'thehill.com':       {name:'The Hill',          bias:'center',     bias_score:0,    factuality:'high',      owner:'Nexstar Media'},
  'axios.com':         {name:'Axios',             bias:'center',     bias_score:-.5,  factuality:'high',      owner:'Cox Enterprises'},
  'cnn.com':           {name:'CNN',               bias:'lean_left',  bias_score:-1.5, factuality:'high',      owner:'Warner Bros. Discovery'},
  'foxnews.com':       {name:'Fox News',          bias:'right',      bias_score:2,    factuality:'mixed',     owner:'Fox Corp / Rupert Murdoch'},
  'wsj.com':           {name:'Wall St. Journal',  bias:'lean_right', bias_score:1,    factuality:'very_high', owner:'News Corp / Murdoch'},
  'bloomberg.com':     {name:'Bloomberg',         bias:'center',     bias_score:0,    factuality:'very_high', owner:'Michael Bloomberg'},
  'propublica.org':    {name:'ProPublica',        bias:'lean_left',  bias_score:-1,   factuality:'very_high', owner:'ProPublica (nonprofit)'},
  'nypost.com':        {name:'NY Post',           bias:'right',      bias_score:2,    factuality:'mixed',     owner:'News Corp / Murdoch'},
  'newsweek.com':      {name:'Newsweek',          bias:'center',     bias_score:0,    factuality:'mixed',     owner:'Dev Pragad'},
  'usatoday.com':      {name:'USA Today',         bias:'center',     bias_score:-.5,  factuality:'high',      owner:'Gannett'},
  'nbcnews.com':       {name:'NBC News',          bias:'lean_left',  bias_score:-1,   factuality:'high',      owner:'NBCUniversal / Comcast'},
  'cbsnews.com':       {name:'CBS News',          bias:'lean_left',  bias_score:-1,   factuality:'high',      owner:'Paramount Global'},
  'abcnews.go.com':    {name:'ABC News',          bias:'lean_left',  bias_score:-1,   factuality:'high',      owner:'Walt Disney Company'},
  'msnbc.com':         {name:'MSNBC',             bias:'left',       bias_score:-2,   factuality:'mixed',     owner:'NBCUniversal / Comcast'},
  'breitbart.com':     {name:'Breitbart',         bias:'far_right',  bias_score:3,    factuality:'low',       owner:'Robert Shillman'},
  'dailywire.com':     {name:'Daily Wire',        bias:'right',      bias_score:2.5,  factuality:'mixed',     owner:'Ben Shapiro / Jeremy Boreing'},
  'theatlantic.com':   {name:'The Atlantic',      bias:'lean_left',  bias_score:-1,   factuality:'high',      owner:'Laurene Powell Jobs'},
  'time.com':          {name:'TIME',              bias:'lean_left',  bias_score:-1,   factuality:'high',      owner:'Marc Benioff'},
  'vox.com':           {name:'Vox',               bias:'left',       bias_score:-2,   factuality:'high',      owner:'Vox Media'},
  'businessinsider.com':{name:'Business Insider', bias:'lean_left',  bias_score:-1,   factuality:'high',      owner:'Axel Springer'},
  'wired.com':         {name:'Wired',             bias:'lean_left',  bias_score:-1,   factuality:'high',      owner:'Condé Nast'},
  'latimes.com':       {name:'LA Times',          bias:'lean_left',  bias_score:-1,   factuality:'high',      owner:'Patrick Soon-Shiong'},
};

function getSourceInfo(url) {
  try {
    const domain = new URL(url).hostname.replace('www.','');
    return SOURCES[domain] || null;
  } catch { return null; }
}

function biasToPercent(score) {
  // score: -3 to +3 → 0% to 100%
  return ((score + 3) / 6) * 100;
}

const BIAS_LABELS = {
  far_left:'Far Left', left:'Left', lean_left:'Lean Left',
  center:'Center', lean_right:'Lean Right', right:'Right', far_right:'Far Right'
};

// ── BiasMeter ────────────────────────────────────────────────────────────────
function BiasMeter({ bias, score }) {
  const pct = biasToPercent(score ?? 0);
  return (
    <div style={{minWidth:120}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:4}}>
        <span className={`bias-badge b-${bias}`}>{BIAS_LABELS[bias] || bias}</span>
      </div>
      <div className="bias-track">
        <div className="bias-thumb" style={{left:`${pct}%`}} />
      </div>
      <div className="bias-labels"><span>L</span><span>C</span><span>R</span></div>
    </div>
  );
}

// ── CoverageSummary ──────────────────────────────────────────────────────────
function CoverageSummary({ sources }) {
  if (!sources || sources.length === 0) return null;
  const left = sources.filter(s => (s.bias_score ?? 0) < -0.5).length;
  const right = sources.filter(s => (s.bias_score ?? 0) > 0.5).length;
  const center = sources.length - left - right;
  const total = sources.length;
  const lw = Math.round((left/total)*100);
  const cw = Math.round((center/total)*100);
  const rw = 100 - lw - cw;
  const isBlindspot = (left === 0 && right > 0) || (right === 0 && left > 0);
  return (
    <div>
      <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:4,flexWrap:'wrap'}}>
        <span className="coverage-count"><strong>{total}</strong> sources</span>
        {isBlindspot && <span className="blindspot-flag">⚠ Blindspot</span>}
      </div>
      <div className="coverage-bar">
        {lw > 0 && <div className="cov-seg cov-left" style={{width:`${lw}%`}} />}
        {cw > 0 && <div className="cov-seg cov-center" style={{width:`${cw}%`}} />}
        {rw > 0 && <div className="cov-seg cov-right" style={{width:`${rw}%`}} />}
      </div>
      <div style={{display:'flex',gap:12,fontSize:11,color:'var(--muted)'}}>
        {left > 0 && <span style={{color:'var(--left)'}}>◆ {left} Left</span>}
        {center > 0 && <span style={{color:'var(--center)'}}>◆ {center} Center</span>}
        {right > 0 && <span style={{color:'var(--right)'}}>◆ {right} Right</span>}
      </div>
    </div>
  );
}

// ── NewsCard ─────────────────────────────────────────────────────────────────
function NewsCard({ article }) {
  const si = article.source_info || getSourceInfo(article.url || '') || {};
  const [expanded, setExpanded] = useState(false);

  return (
    <div className="news-card">
      <div className="card-top">
        <div style={{flex:1}}>
          <div className="card-headline">
            <a href={article.url} target="_blank" rel="noopener">{article.title}</a>
          </div>
          <div className="card-meta">
            <span className="source-chip">
              <strong style={{color:'var(--white)'}}>{si.name || article.source_name || 'Unknown'}</strong>
              {si.owner && <span className="owner">· {si.owner}</span>}
            </span>
            {si.factuality && <span className={`factuality f-${si.factuality}`}>{si.factuality.replace('_',' ')}</span>}
            {article.published_at && (
              <span style={{fontSize:12,color:'var(--muted)'}}>
                {new Date(article.published_at).toLocaleDateString('en-US',{month:'short',day:'numeric'})}
              </span>
            )}
          </div>
        </div>
        {si.bias && <BiasMeter bias={si.bias} score={si.bias_score} />}
      </div>

      {article.coverage && <CoverageSummary sources={article.coverage} />}

      {article.description && (
        <div className="card-description">
          {expanded ? article.description : article.description.slice(0,180) + (article.description.length > 180 ? '…' : '')}
          {article.description.length > 180 && (
            <button onClick={() => setExpanded(!expanded)}
              style={{color:'var(--teal)',fontSize:12,marginLeft:6,background:'none'}}>
              {expanded ? 'less' : 'more'}
            </button>
          )}
        </div>
      )}
    </div>
  );
}

// ── Source Breakdown Widget ──────────────────────────────────────────────────
function SourceBreakdown() {
  const ownershipCounts = {};
  Object.values(SOURCES).forEach(s => {
    const cat = s.owner.includes('nonprofit') ? 'Nonprofit' :
                s.owner.includes('Murdoch') ? 'Murdoch Empire' :
                s.owner.includes('Axel') ? 'Axel Springer' :
                s.owner.includes('Comcast') ? 'Comcast/NBC' :
                s.owner.includes('Disney') ? 'Disney/ABC' :
                s.owner.includes('Warner') ? 'Warner Bros.' : 'Other';
    ownershipCounts[cat] = (ownershipCounts[cat] || 0) + 1;
  });
  const total = Object.values(ownershipCounts).reduce((a,b)=>a+b,0);
  const sorted = Object.entries(ownershipCounts).sort((a,b)=>b[1]-a[1]).slice(0,6);
  return (
    <div className="widget">
      <div className="widget-title">Ownership Map</div>
      {sorted.map(([name, count]) => (
        <div key={name} className="ownership-row">
          <span className="own-label">{name}</span>
          <div className="own-bar-wrap"><div className="own-bar" style={{width:`${(count/sorted[0][1])*100}%`}} /></div>
          <span className="own-pct">{Math.round((count/total)*100)}%</span>
        </div>
      ))}
      <a href="civic-overlay/ownership-graph.html" style={{fontSize:12,marginTop:12,display:'block',color:'var(--teal)'}}>
        View full ownership graph →
      </a>
    </div>
  );
}

// ── Top Sources Widget ────────────────────────────────────────────────────────
function TopSources() {
  const sources = Object.values(SOURCES)
    .filter(s => s.factuality === 'very_high')
    .sort((a,b) => Math.abs(a.bias_score) - Math.abs(b.bias_score))
    .slice(0,6);
  return (
    <div className="widget">
      <div className="widget-title">High Credibility Sources</div>
      {sources.map(s => (
        <div key={s.name} className="source-row">
          <div>
            <div className="source-name">{s.name}</div>
            <div className="source-owner-sm">{s.owner}</div>
          </div>
          <span className={`bias-badge b-${s.bias}`} style={{fontSize:10}}>{BIAS_LABELS[s.bias]}</span>
        </div>
      ))}
    </div>
  );
}

// ── NewsletterSection ─────────────────────────────────────────────────────────
function NewsletterSection() {
  const [email, setEmail] = useState('');
  const [status, setStatus] = useState('idle');

  const handleSubmit = async (e) => {
    e.preventDefault();
    if (!email) return;
    setStatus('loading');
    try {
      const r = await fetch(`${API}/subscribe`, {
        method: 'POST',
        headers: {'Content-Type':'application/json','x-api-key': window.CRN_KEY || ''},
        body: JSON.stringify({ email })
      });
      setStatus(r.ok ? 'success' : 'error');
    } catch {
      // Fallback: link to Substack
      window.open('https://civicresiliencenetwork.substack.com', '_blank');
      setStatus('success');
    }
  };

  return (
    <section className="newsletter-section" id="newsletter">
      <div className="container">
        <div className="nl-card">
          <div style={{fontSize:32,marginBottom:12}}>📬</div>
          <h2>The Civic Resilience Brief</h2>
          <p>Weekly news intelligence — bias ratings, ownership transparency, and the stories your usual sources aren't covering. Free. No ads. No spin.</p>
          {status === 'success' ? (
            <div style={{color:'var(--teal)',fontWeight:700,fontSize:16}}>
              ✓ You're in. Check your inbox.
            </div>
          ) : (
            <form className="nl-form" onSubmit={handleSubmit}>
              <input type="email" placeholder="your@email.com" value={email}
                onChange={e => setEmail(e.target.value)} required />
              <button className="nl-submit" type="submit" disabled={status==='loading'}>
                {status === 'loading' ? '...' : 'Subscribe'}
              </button>
            </form>
          )}
          <div style={{marginTop:20,fontSize:13,color:'var(--muted)'}}>
            <a href="https://civicresiliencenetwork.substack.com" target="_blank" rel="noopener">
              View past issues →
            </a>
          </div>
        </div>
      </div>
    </section>
  );
}

// ── Main News Feed ────────────────────────────────────────────────────────────
const TOPICS = ['All','Politics','Democracy','Local Government','Economy','Environment','Education'];
const RSS_FEEDS = [
  'https://feeds.npr.org/1001/rss.xml',
  'https://rss.nytimes.com/services/xml/rss/nyt/Politics.xml',
  'https://feeds.washingtonpost.com/rss/politics',
];

function NewsFeed() {
  const [articles, setArticles] = useState([]);
  const [loading, setLoading] = useState(true);
  const [topic, setTopic] = useState('All');
  const [error, setError] = useState(null);

  const fetchNews = useCallback(async () => {
    setLoading(true); setError(null);
    try {
      // Try live API first
      const r = await fetch(`${API}/news?topic=${encodeURIComponent(topic)}&limit=15`, {
        headers: { 'x-api-key': window.CRN_KEY || '' },
        signal: AbortSignal.timeout(6000)
      });
      if (r.ok) {
        const data = await r.json();
        setArticles(data.articles || []);
        setLoading(false);
        return;
      }
    } catch {}

    // Fallback: curated mock articles with real source data
    setArticles(getMockArticles(topic));
    setLoading(false);
  }, [topic]);

  useEffect(() => { fetchNews(); }, [fetchNews]);

  return (
    <section id="news" style={{padding:'60px 0'}}>
      <div className="container">
        <div className="section-header" style={{marginBottom:16}}>
          <div className="section-title">News Intelligence Feed</div>
          <button onClick={fetchNews} style={{background:'none',color:'var(--teal)',fontSize:13,fontWeight:600}}>
            ↻ Refresh
          </button>
        </div>

        <div className="topic-filters">
          {TOPICS.map(t => (
            <button key={t} className={`topic-btn${topic===t?' active':''}`}
              onClick={() => setTopic(t)}>{t}</button>
          ))}
        </div>

        <div style={{display:'grid',gridTemplateColumns:'1fr 320px',gap:24,alignItems:'start'}}>
          <div>
            {loading ? (
              <div className="loading-state">
                <div className="spinner" />
                Fetching latest news…
              </div>
            ) : error ? (
              <div className="loading-state" style={{color:'#fca5a5'}}>{error}</div>
            ) : (
              <div className="news-grid">
                {articles.map((a, i) => <NewsCard key={i} article={a} />)}
              </div>
            )}
          </div>
          <div className="sidebar">
            <SourceBreakdown />
            <TopSources />
          </div>
        </div>
      </div>
    </section>
  );
}

      ]
    },
    {

      published_at: new Date(Date.now() - 7200000).toISOString(),
      source_info: SOURCES['thehill.com'],
      coverage: [
        SOURCES['thehill.com'], SOURCES['reuters.com'], SOURCES['wsj.com'],
        SOURCES['foxnews.com'], SOURCES['nytimes.com']

    {

      published_at: new Date(Date.now() - 10800000).toISOString(),
